<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --sky-top: #1a1a2e;
    --sky-bottom: #16213e;
    --pipe-green: #4ade80;
    --pipe-dark: #16a34a;
    --pipe-light: #86efac;
    --bird-yellow: #fde047;
    --bird-orange: #fb923c;
    --bird-white: #fff;
    --score-color: #f0f9ff;
    --glow: 0 0 20px #4ade8088;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  #game-wrapper {
    position: relative;
    width: 400px;
    height: 600px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 60px #4ade8044, 0 0 120px #1a1a2e, inset 0 0 0 2px #4ade8044;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #ui-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  #score-display {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--score-color);
    font-size: 28px;
    text-shadow: 0 0 16px #4ade80, 2px 2px 0 #000;
    letter-spacing: 2px;
  }

  #screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 32px 24px;
    background: rgba(10, 10, 26, 0.88);
    border-radius: 12px;
    border: 2px solid #4ade8066;
    box-shadow: 0 0 40px #4ade8033;
    max-width: 320px;
    text-align: center;
  }

  #screen.hidden { display: none; }

  #screen h1 {
    color: var(--pipe-green);
    font-size: 22px;
    text-shadow: 0 0 20px #4ade80, 2px 2px 0 #000;
    line-height: 1.5;
  }

  #screen .sub {
    color: #94a3b8;
    font-size: 9px;
    line-height: 1.8;
  }

  #screen .final-score {
    color: #fde047;
    font-size: 36px;
    text-shadow: 0 0 20px #fde04788;
  }

  #screen .best {
    color: #94a3b8;
    font-size: 9px;
  }
  #screen .best span { color: #4ade80; }

  .btn {
    pointer-events: all;
    cursor: pointer;
    background: linear-gradient(135deg, #4ade80, #16a34a);
    color: #000;
    border: none;
    padding: 14px 28px;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    border-radius: 8px;
    box-shadow: 0 4px 0 #166534, 0 0 20px #4ade8066;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 1px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #166534, 0 0 30px #4ade8099; }
  .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #166534; }

  #medal {
    font-size: 42px;
    filter: drop-shadow(0 0 12px gold);
  }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="canvas" width="400" height="600"></canvas>
  <div id="ui-overlay">
    <div id="score-display">0</div>
    <div id="screen">
      <h1>FLAPPY<br>BIRD</h1>
      <p class="sub">TAP / CLICK / SPACE<br>TO FLAP YOUR WINGS</p>
      <button class="btn" id="start-btn">START GAME</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 400, H = 600;

const scoreDisplay = document.getElementById('score-display');
const screen = document.getElementById('screen');
const startBtn = document.getElementById('start-btn');

// Stars
const stars = Array.from({length: 80}, () => ({
  x: Math.random() * W,
  y: Math.random() * H * 0.7,
  r: Math.random() * 1.5 + 0.3,
  alpha: Math.random() * 0.7 + 0.3,
  twinkle: Math.random() * Math.PI * 2
}));

// Ground tiles
const GROUND_H = 80;
const GROUND_Y = H - GROUND_H;

// Game state
let state = 'idle'; // idle | countdown | playing | dead
let countdownVal = 3;
let countdownTimer = 0;
let score = 0;
let best = parseInt(localStorage.getItem('fb_best') || '0');
let frame = 0;

// Bird
const bird = {
  x: 90,
  y: H / 2,
  vy: 0,
  angle: 0,
  flap: 0,
  alive: true,
  reset() {
    this.x = 90;
    this.y = H / 2;
    this.vy = 0;
    this.angle = 0;
    this.flap = 0;
    this.alive = true;
  }
};

// ── TUNED PHYSICS ──────────────────────────────────────────
const GRAVITY      = 0.07;   // was 0.12  → slower fall
const JUMP         = -3.5;   // reduced jump height
const PIPE_W       = 60;
const PIPE_GAP     = 195;    // was 155   → taller opening
const PIPE_SPEED   = 1.8;
const PIPE_INTERVAL = 130;   // was 90    → more space between pipes
// ───────────────────────────────────────────────────────────

let pipes = [];
let particles = [];
let groundX = 0;
let bgX = 0;

function addPipe() {
  const minY = 80, maxY = GROUND_Y - PIPE_GAP - 80;
  const gapY = minY + Math.random() * (maxY - minY);
  pipes.push({ x: W + 10, gapY, scored: false });
}

function jump() {
  if (state === 'dead' || state === 'countdown' || state === 'idle') return;
  bird.vy = JUMP;
  bird.flap = 8;
  spawnFlapParticles();
}

function spawnFlapParticles() {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: bird.x - 10,
      y: bird.y + 5,
      vx: -Math.random() * 3 - 1,
      vy: (Math.random() - 0.5) * 3,
      life: 1,
      decay: 0.07 + Math.random() * 0.05,
      r: Math.random() * 4 + 2,
      color: Math.random() > 0.5 ? '#fde047' : '#fb923c'
    });
  }
}

function spawnDeathParticles() {
  for (let i = 0; i < 20; i++) {
    const angle = (i / 20) * Math.PI * 2;
    const speed = Math.random() * 5 + 2;
    particles.push({
      x: bird.x,
      y: bird.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      life: 1,
      decay: 0.03,
      r: Math.random() * 5 + 3,
      color: ['#fde047','#fb923c','#fff','#4ade80'][Math.floor(Math.random()*4)]
    });
  }
}

function checkCollision() {
  const bx = bird.x, by = bird.y, br = 14;

  // Ground / ceiling
  if (by + br >= GROUND_Y || by - br <= 0) return true;

  // Pipes
  for (const p of pipes) {
    const px = p.x, pw = PIPE_W;
    if (bx + br > px && bx - br < px + pw) {
      if (by - br < p.gapY || by + br > p.gapY + PIPE_GAP) return true;
    }
  }
  return false;
}

function update() {
  frame++;
  bgX = (bgX - 0.4) % W;
  groundX = (groundX - PIPE_SPEED) % 40;

  // Twinkle stars
  stars.forEach(s => s.twinkle += 0.04);

  if (state === 'countdown') {
    // Bird floats during countdown
    const hover = Math.sin(frame * 0.07) * 6;
    bird.y = H / 2 + hover;
    bird.angle = Math.sin(frame * 0.07) * 0.15;
    bird.flap = frame % 18 < 4 ? 6 : 0;
    countdownTimer++;
    if (countdownTimer >= 60) {
      countdownTimer = 0;
      countdownVal--;
      if (countdownVal <= 0) {
        state = 'playing';
        bird.vy = 0;
      }
    }
  }

  if (state === 'playing') {
    // Physics
    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.flap = Math.max(0, bird.flap - 1);
    bird.angle = Math.min(Math.PI / 2.2, Math.max(-0.4, bird.vy * 0.08));

    // Pipes
    if (frame % PIPE_INTERVAL === 0) addPipe();
    pipes.forEach(p => p.x -= PIPE_SPEED);
    pipes = pipes.filter(p => p.x + PIPE_W > -10);

    // Score
    pipes.forEach(p => {
      if (!p.scored && p.x + PIPE_W < bird.x) {
        p.scored = true;
        score++;
        scoreDisplay.textContent = score;
        scoreDisplay.style.transform = 'translateX(-50%) scale(1.3)';
        setTimeout(() => scoreDisplay.style.transform = 'translateX(-50%) scale(1)', 150);
      }
    });

    // Collision
    if (checkCollision()) {
      state = 'dead';
      bird.alive = false;
      spawnDeathParticles();
      if (score > best) {
        best = score;
        localStorage.setItem('fb_best', best);
      }
      setTimeout(showDeathScreen, 900);
    }
  }

  // Particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);
}

function showDeathScreen() {
  const medal = score >= 40 ? '🏆' : score >= 20 ? '🥇' : score >= 10 ? '🥈' : score >= 5 ? '🥉' : '💀';
  screen.innerHTML = `
    <div id="medal">${medal}</div>
    <h1>GAME<br>OVER</h1>
    <div class="final-score">${score}</div>
    <div class="best">BEST: <span>${best}</span></div>
    <button class="btn" id="start-btn">PLAY AGAIN</button>
  `;
  screen.classList.remove('hidden');
  document.getElementById('start-btn').addEventListener('click', restart);
}

function restart() {
  score = 0;
  pipes = [];
  particles = [];
  frame = 0;
  bird.reset();
  scoreDisplay.textContent = '0';
  state = 'countdown';
  countdownVal = 3;
  countdownTimer = 0;
  screen.classList.add('hidden');
}

function startGame() {
  score = 0;
  pipes = [];
  particles = [];
  frame = 0;
  bird.reset();
  scoreDisplay.textContent = '0';
  state = 'countdown';
  countdownVal = 3;
  countdownTimer = 0;
  screen.classList.add('hidden');
}

// Drawing helpers
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#0d0d1a');
  grad.addColorStop(1, '#0d1f3c');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);
}

function drawStars() {
  stars.forEach(s => {
    const a = 0.3 + 0.7 * (Math.sin(s.twinkle) * 0.5 + 0.5);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${a * s.alpha})`;
    ctx.fill();
  });
}

function drawMoon() {
  ctx.save();
  ctx.beginPath();
  ctx.arc(340, 60, 28, 0, Math.PI * 2);
  const moonGrad = ctx.createRadialGradient(335, 55, 4, 340, 60, 28);
  moonGrad.addColorStop(0, '#fff8dc');
  moonGrad.addColorStop(1, '#fde68a88');
  ctx.fillStyle = moonGrad;
  ctx.shadowColor = '#fde68a';
  ctx.shadowBlur = 30;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#f5d50044';
  [[330,62,5],[348,52,3],[338,70,4]].forEach(([cx,cy,cr]) => {
    ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawPipe(p) {
  const x = p.x, gapY = p.gapY, gapBot = gapY + PIPE_GAP;

  ctx.shadowColor = '#4ade8066';
  ctx.shadowBlur = 12;

  const g1 = ctx.createLinearGradient(x, 0, x + PIPE_W, 0);
  g1.addColorStop(0, '#15803d');
  g1.addColorStop(0.2, '#4ade80');
  g1.addColorStop(0.8, '#16a34a');
  g1.addColorStop(1, '#14532d');
  ctx.fillStyle = g1;
  ctx.fillRect(x, 0, PIPE_W, gapY - 14);

  ctx.fillStyle = '#4ade80';
  ctx.shadowBlur = 18;
  roundRect(ctx, x - 5, gapY - 30, PIPE_W + 10, 30, 6);
  ctx.fill();
  ctx.fillStyle = '#86efac66';
  ctx.fillRect(x + 4, gapY - 28, 8, 22);

  ctx.shadowBlur = 12;
  const g2 = ctx.createLinearGradient(x, 0, x + PIPE_W, 0);
  g2.addColorStop(0, '#15803d');
  g2.addColorStop(0.2, '#4ade80');
  g2.addColorStop(0.8, '#16a34a');
  g2.addColorStop(1, '#14532d');
  ctx.fillStyle = g2;
  ctx.fillRect(x, gapBot + 14, PIPE_W, GROUND_Y - gapBot - 14);

  ctx.fillStyle = '#4ade80';
  ctx.shadowBlur = 18;
  roundRect(ctx, x - 5, gapBot, PIPE_W + 10, 30, 6);
  ctx.fill();
  ctx.fillStyle = '#86efac66';
  ctx.fillRect(x + 4, gapBot + 6, 8, 22);

  ctx.shadowBlur = 0;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawGround() {
  const gg = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  gg.addColorStop(0, '#854d0e');
  gg.addColorStop(0.15, '#92400e');
  gg.addColorStop(1, '#1c0a00');
  ctx.fillStyle = gg;
  ctx.fillRect(0, GROUND_Y, W, GROUND_H);

  ctx.fillStyle = '#4ade80';
  ctx.fillRect(0, GROUND_Y, W, 8);
  ctx.fillStyle = '#86efac';
  ctx.fillRect(0, GROUND_Y, W, 3);

  ctx.strokeStyle = '#a16207';
  ctx.lineWidth = 1;
  for (let x = groundX; x < W; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND_Y + 8);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 30);
  ctx.lineTo(W, GROUND_Y + 30);
  ctx.stroke();
}

function drawBird() {
  if (!bird.alive && Math.floor(Date.now() / 100) % 2 === 0) return;

  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.angle);

  const flapOffset = bird.flap > 0 ? -8 : 4;

  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 4;

  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 14, 0, 0, Math.PI * 2);
  const bodyGrad = ctx.createRadialGradient(-4, -4, 2, 0, 0, 18);
  bodyGrad.addColorStop(0, '#fef08a');
  bodyGrad.addColorStop(0.6, '#fde047');
  bodyGrad.addColorStop(1, '#ca8a04');
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

  ctx.beginPath();
  ctx.ellipse(-4, flapOffset, 10, 6, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = '#fb923c';
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(8, -4, 6, 6, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(10, -4, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#1e293b';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(11, -5.5, 1.2, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(14, -1);
  ctx.lineTo(22, 2);
  ctx.lineTo(14, 5);
  ctx.closePath();
  ctx.fillStyle = '#f97316';
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(14, 2);
  ctx.lineTo(22, 2);
  ctx.strokeStyle = '#c2410c';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.restore();
  });
}

function drawIdleBird() {
  const hover = Math.sin(frame * 0.07) * 6;
  bird.y = H / 2 + hover;
  bird.angle = Math.sin(frame * 0.07) * 0.15;
  bird.flap = frame % 18 < 4 ? 6 : 0;
}

function drawCountdown() {
  if (state !== 'countdown') return;
  const pulse = 1 + 0.15 * Math.sin(countdownTimer * 0.2);
  ctx.save();
  ctx.translate(W / 2, H / 2 - 80);
  ctx.scale(pulse, pulse);
  ctx.font = "bold 72px 'Press Start 2P', monospace";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#4ade80';
  ctx.shadowColor = '#4ade80';
  ctx.shadowBlur = 30;
  ctx.fillText(countdownVal, 0, 0);
  ctx.restore();
  ctx.save();
  ctx.font = "12px 'Press Start 2P', monospace";
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f0f9ff';
  ctx.shadowColor = '#4ade80';
  ctx.shadowBlur = 10;
  ctx.fillText('GET READY', W / 2, H / 2 - 150);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawStars();
  drawMoon();
  pipes.forEach(drawPipe);
  drawGround();
  if (state === 'idle' || state === 'countdown') drawIdleBird();
  drawBird();
  drawParticles();
  drawCountdown();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Input
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
canvas.addEventListener('click', jump);
document.getElementById('game-wrapper').addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });
startBtn.addEventListener('click', startGame);

loop();
</script>
</body>
</html>
